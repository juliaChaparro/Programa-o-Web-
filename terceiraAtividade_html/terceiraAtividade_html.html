<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Animes</title>
</head>
<body> 
    <h1>Formulario de animes</h1>
    <p>Forms para saber mas do seus gostos de anime :p </p>

    <form>
        <fieldset>
            <legend>Dados dos animes</legend>
                Nome de anime: <input type="text"> <br>
                <label for="email">email</label>
                <input type="email" name="email" id="email" required
                placeholder="seuemail@gostoDeAnimes.com"> <br>
                Site: <input type="url" placeholder="Site Favorito">
        </fieldset>

        <fieldset>
            <legend>Anime do ano</legend>

            <label for="anime">One Piece</label>
            <input type="radio" name="bestSeler" id="anime">

            <label for="anime2">Tensei Shireta slime data ken</label>
            <input type="radio" name="bestSeler" id="anime2">            

        </fieldset>

        <fieldset>
            <legend>Seu Genero de anime Favorito</legend>
            
            <label for="Isekai">Isekai</label>
            <input type="checkbox" name="generoFavorito" id="Isekai" value="Isekai">    

            <label for="Aventura">Aventura</label>
            <input type="checkbox" name="generoFavorito" id="Aventura" value="Aventura">

            <label for="Romance">Romance</label>
            <input type="checkbox" name="generoFavorito" id="Romance" value="Romance">

            <label for="sliceoflife">slice of life</label>
            <input type="checkbox" name="generoFavorito" id="sliceoflife" value="sliceoflife">

        </fieldset>

        <fieldset>
            <legend>Dados complementares</legend>

            Data de lançamento do anime: <input type="date" name="dataAnimes" id="Date">
            <br>
            <label for="ano">Ano que começou a assistir animes</label> 
            <input type="number" name="ano" min="1500" max="2500" step="1">

        </fieldset>

        <fieldset>
            <legend>Submeta uma imagem de manga</legend>
            <input type="file" name="imagem" id="img">
        </fieldset>

        <fieldset>
            <legend>Fale de como vc veio para este mundo</legend>
            <textarea name="umaMensagen" id="umaMensagen" rows="4" cols="50"></textarea>

        </fieldset>


        <input type="reset" value="Resetar Dados">
        <input type="submit" name="submit" value="Enviar">

    </form>

</body>
